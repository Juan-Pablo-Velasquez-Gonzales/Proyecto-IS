<!-- inicio.html -->
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bienvenido</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            width:100%;
            min-height:100vh;

            background:black;

            overflow-x:hidden;

            display:flex;
            justify-content:center;
            align-items:center;

            position:relative;
        }

        /* ===== FONDO SUAVE ===== */

        body::before{

            content:"";

            position:absolute;

            width:700px;
            height:700px;

            background:radial-gradient(circle,
            rgba(255,255,255,0.10) 0%,
            rgba(255,255,255,0.03) 40%,
            transparent 70%);

            filter:blur(50px);

            z-index:0;
        }

        /* ===== CONTENEDOR ===== */

        .contenedor{

            width:90%;
            max-width:700px;

            display:flex;
            flex-direction:column;
            align-items:center;

            position:relative;

            z-index:2;

            padding-bottom:50px;
        }

        /* ===== TITULO ===== */

        .titulo{

            color:white;

            font-size:clamp(50px,8vw,90px);

            font-weight:bold;

            margin-bottom:10px;

            opacity:0;

            text-align:center;

            animation:caer 1.2s ease forwards;
        }

        .subtitulo{

            color:white;

            font-size:clamp(18px,2vw,28px);

            opacity:0.85;

            margin-bottom:60px;

            text-align:center;

            opacity:0;

            animation:caer 1.2s ease forwards;

            animation-delay:0.3s;

            padding:0 10px;
        }

        /* ===== BOTONES ===== */

        .botones{

            width:100%;

            display:flex;
            flex-direction:column;

            gap:35px;
        }

        .boton{

            width:100%;

            padding:28px;

            border:5px solid rgba(255,255,255,0.7);

            background:rgba(255,255,255,0.05);

            color:white;

            font-size:clamp(28px,4vw,50px);

            border-radius:10px;

            cursor:pointer;

            backdrop-filter:blur(6px);

            box-shadow:
            0 0 10px rgba(255,255,255,0.15),
            0 0 25px rgba(255,255,255,0.08);

            transition:0.3s;

            opacity:0;

            transform:translateY(100px);
        }

        .boton:hover{

            transform:scale(1.03);

            background:rgba(255,255,255,0.10);

            box-shadow:
            0 0 15px rgba(255,255,255,0.25),
            0 0 35px rgba(255,255,255,0.15);
        }

        /* ===== ANIMACIONES ===== */

        .boton:nth-child(1){

            animation:subir 1s ease forwards;

            animation-delay:0.8s;
        }

        .boton:nth-child(2){

            animation:subir 1s ease forwards;

            animation-delay:1.1s;
        }

        .boton:nth-child(3){

            animation:subir 1s ease forwards;

            animation-delay:1.4s;
        }

        @keyframes caer{

            from{

                opacity:0;

                transform:translateY(-80px);
            }

            to{

                opacity:1;

                transform:translateY(0);
            }
        }

        @keyframes subir{

            from{

                opacity:0;

                transform:translateY(120px);
            }

            to{

                opacity:1;

                transform:translateY(0);
            }
        }

        /* ===== FOOTER ===== */

        .footer{

            position:fixed;

            bottom:0;
            left:0;

            width:100%;

            height:32px;

            background:black;

            color:white;

            display:flex;
            align-items:center;
            justify-content:space-between;

            padding:4px 14px;

            z-index:1000;

            overflow:hidden;
        }

        .estudiantes h3{

            margin-bottom:1px;

            font-size:10px;
        }

        .lista-estudiantes{

            display:flex;
            flex-direction:row;

            gap:6px;

            font-size:8px;

            line-height:8px;
        }

        .marca-agua{

            font-size:8px;

            opacity:0.30;

            letter-spacing:1px;
        }

        /* ===== RESPONSIVE ===== */

        @media(max-width:768px){

            .contenedor{

                flex-direction:column;
            }

            .sidebar{

                width:100%;

                min-height:auto;

                display:flex;
                flex-direction:column;
                align-items:center;
            }

            .menu{

                width:100%;

                flex-direction:row;

                justify-content:center;

                flex-wrap:wrap;
            }

            .menu button{

                width:180px;
            }

            .footer{

                justify-content:space-between;
            }

        }

    </style>

</head>

<body>

    <div class="contenedor">

        <!-- TITULO -->

        <div class="titulo">
            Bienvenido
        </div>

        <div class="subtitulo">
            Escoja el uso que desea:
        </div>

        <!-- BOTONES -->

        <div class="botones">

            <button class="boton"
            onclick="window.location.href='agua.html'">

                Domiciliario

            </button>

            <button class="boton"
            onclick="window.location.href='gasolinera.html'">

                Gasolinera

            </button>

            <button class="boton"
            onclick="window.location.href='otro.html'">

                Otro...

            </button>

        </div>

    </div>

    <!-- ===== FOOTER ===== -->

    <div class="footer">

        <div class="estudiantes">

            <div class="lista-estudiantes">
            <div>- Zabaleta Zelaya Sergio Gabriel</div>
                <div>- Juan Pablo Velasquez Gonzales</div>
                <div>- Kevin Gary Villanueva Chuquimia</div>
                <div>- Rodriguez Chalco Dayana Karen</div>
                <div>- Luis Cristofer Santalla Lopez</div>
            </div>

        </div>

        <div class="marca-agua">
            La Paz - Bolivia, 2026
        </div>

    </div>

</body>

</html>

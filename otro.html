<!-- otro.html -->
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Próximamente</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    width:100%;
    min-height:100vh;

    background:black;

    overflow-x:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* ===== FONDO SUAVE ===== */

body::before{

    content:"";

    position:absolute;

    width:700px;
    height:700px;

    background:radial-gradient(circle,
    rgba(255,255,255,0.10) 0%,
    rgba(255,255,255,0.03) 40%,
    transparent 70%);

    filter:blur(50px);

    z-index:0;
}

/* ===== CONTENEDOR ===== */

.contenedor{

    width:90%;
    max-width:800px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    position:relative;

    z-index:2;

    text-align:center;

    padding-bottom:60px;
}

/* ===== TITULO ===== */

.titulo{

    color:white;

    font-size:clamp(35px,5vw,65px);

    font-weight:bold;

    margin-bottom:30px;

    opacity:0;

    animation:caer 1.2s ease forwards;
}

/* ===== TEXTO ===== */

.texto{

    color:white;

    font-size:clamp(18px,2vw,28px);

    line-height:1.8;

    opacity:0.85;

    max-width:700px;

    margin-bottom:60px;

    opacity:0;

    animation:caer 1.2s ease forwards;

    animation-delay:0.3s;

    padding:0 15px;
}

/* ===== BOTÓN ATRÁS ===== */

.boton-atras{

    width:90px;
    height:90px;

    border:3px solid rgba(255,255,255,0.6);

    border-radius:50%;

    background:rgba(255,255,255,0.05);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    backdrop-filter:blur(6px);

    transition:0.3s;

    opacity:0;

    animation:subir 1s ease forwards;

    animation-delay:0.8s;
}

.boton-atras:hover{

    transform:scale(1.08);

    background:rgba(255,255,255,0.10);

    box-shadow:
    0 0 15px rgba(255,255,255,0.20),
    0 0 35px rgba(255,255,255,0.10);
}

/* ===== ANIMACIONES ===== */

@keyframes caer{

    from{

        opacity:0;

        transform:translateY(-80px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

@keyframes subir{

    from{

        opacity:0;

        transform:translateY(120px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

/* ===== FOOTER ===== */

        .footer{

            position:fixed;

            bottom:0;
            left:0;

            width:100%;

            height:32px;

            background:black;

            color:white;

            display:flex;
            align-items:center;
            justify-content:space-between;

            padding:4px 14px;

            z-index:1000;

            overflow:hidden;
        }

        .estudiantes h3{

            margin-bottom:1px;

            font-size:10px;
        }

        .lista-estudiantes{

            display:flex;
            flex-direction:row;

            gap:6px;

            font-size:8px;

            line-height:8px;
        }

        .marca-agua{

            font-size:8px;

            opacity:0.30;

            letter-spacing:1px;
        }

@media(max-width:768px){

            .contenedor{

                flex-direction:column;
            }

            .sidebar{

                width:100%;

                min-height:auto;

                display:flex;
                flex-direction:column;
                align-items:center;
            }

            .menu{

                width:100%;

                flex-direction:row;

                justify-content:center;

                flex-wrap:wrap;
            }

            .menu button{

                width:180px;
            }

            .footer{

                justify-content:space-between;
            }

        }

</style>

</head>

<body>

<div class="contenedor">

    <!-- TITULO -->

    <div class="titulo">
        Próximamente
    </div>

    <!-- TEXTO -->

    <div class="texto">

        Seguimos trabajando para más usos del sistema,
        próximamente...

    </div>

    <!-- BOTÓN ATRÁS -->

    <button class="boton-atras"
    onclick="window.location.href='index.html'">

        <svg xmlns="http://www.w3.org/2000/svg"
             width="40"
             height="40"
             viewBox="0 0 24 24"
             fill="none"
             stroke="white"
             stroke-width="2.5"
             stroke-linecap="round"
             stroke-linejoin="round">

            <path d="M15 18l-6-6 6-6"></path>

        </svg>

    </button>

</div>

<!-- ===== FOOTER ===== -->

<div class="footer">

    <div class="estudiantes">

        <div class="lista-estudiantes">

            <div>- Zabaleta Zelaya Sergio Gabriel</div>
            <div>- Juan Pablo Velasquez Gonzales</div>
            <div>- Kevin Gary Villanueva Chuquimia</div>
            <div>- Rodriguez Chalco Dayana Karen</div>
            <div>- Luis Cristofer Santalla Lopez</div>

        </div>

    </div>

    <div class="marca-agua">
        La Paz - Bolivia, 2026
    </div>

</div>

</body>

</html>
